<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coil &amp; Climb — Snakes and Ladders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#132623;
    --bg-deep-2:#0d1c1a;
    --panel:#1c342f;
    --panel-edge:#2a4a42;
    --parchment-light:#f4e9d8;
    --parchment-dark:#dcc9a3;
    --gold:#c9a227;
    --gold-bright:#e4c247;
    --snake-red:#c0473a;
    --snake-red-dark:#8f3128;
    --p1:#e4572e;
    --p1-dark:#a83c1c;
    --p2:#3f9dab;
    --p2-dark:#296d78;
    --ink:#eef4f1;
    --ink-dim:#a9c2ba;
    --success:#7fb069;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 800px at 15% -10%, #1c3a34 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #16302c 0%, transparent 55%),
      var(--bg-deep-2);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 60px;
  }
  .app{
    width:100%;
    max-width:1080px;
    display:grid;
    grid-template-columns:1fr;
    gap:22px;
  }
  header{
    text-align:center;
    padding:6px 0 4px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--gold-bright);
    font-weight:600;
    margin-bottom:6px;
  }
  header h1{
    font-family:'Fredoka',sans-serif;
    font-size:clamp(30px,5vw,44px);
    margin:0;
    font-weight:700;
    letter-spacing:.01em;
    color:var(--ink);
  }
  header h1 span{color:var(--gold-bright);}
  header p.sub{
    color:var(--ink-dim);
    margin:8px 0 0;
    font-size:14.5px;
  }

  /* ---- Setup screen ---- */
  .setup{
    background:linear-gradient(180deg,var(--panel),var(--bg-deep));
    border:1px solid var(--panel-edge);
    border-radius:18px;
    padding:32px;
    max-width:560px;
    margin:10px auto 0;
    text-align:center;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.6);
  }
  .setup h2{
    font-family:'Fredoka',sans-serif;
    font-size:22px;
    margin:0 0 18px;
  }
  .mode-choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:22px;
  }
  .mode-btn{
    background:var(--bg-deep-2);
    border:2px solid var(--panel-edge);
    border-radius:14px;
    padding:18px 12px;
    color:var(--ink);
    font-family:'Fredoka',sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:border-color .15s, transform .15s, background .15s;
  }
  .mode-btn:hover{transform:translateY(-2px);}
  .mode-btn.active{
    border-color:var(--gold-bright);
    background:#24413a;
  }
  .mode-btn .icon{font-size:26px;display:block;margin-bottom:8px;}
  .name-fields{
    display:grid;
    gap:10px;
    margin-bottom:22px;
    text-align:left;
  }
  .name-field label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-dim);
    display:block;
    margin-bottom:5px;
  }
  .name-field input{
    width:100%;
    padding:10px 12px;
    border-radius:9px;
    border:1.5px solid var(--panel-edge);
    background:var(--bg-deep-2);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
  }
  .name-field input:focus{outline:2px solid var(--gold-bright); border-color:transparent;}
  .start-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    color:#2a2005;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition:filter .15s, transform .15s;
  }
  .start-btn:hover{filter:brightness(1.08); transform:translateY(-1px);}

  /* ---- Game screen ---- */
  .game{
    display:none;
    grid-template-columns:minmax(0,1fr) 260px;
    gap:22px;
  }
  .game.active{display:grid;}
  @media (max-width:820px){
    .game.active{grid-template-columns:1fr;}
  }

  .board-wrap{
    background:linear-gradient(180deg,#3e2a1c,#2a1c12);
    border-radius:18px;
    padding:16px;
    box-shadow:0 24px 60px -25px rgba(0,0,0,.7), inset 0 0 0 1px #4a3521;
  }
  .board{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    display:grid;
    grid-template-columns:repeat(10,1fr);
    grid-template-rows:repeat(10,1fr);
    border-radius:8px;
    overflow:hidden;
    box-shadow:inset 0 0 0 3px #5a3f26;
  }
  .cell{
    position:relative;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    font-size:clamp(8px,1.3vw,12px);
    color:#8a7757;
    font-weight:600;
    padding:3px 4px;
    user-select:none;
  }
  .cell.light{background:var(--parchment-light);}
  .cell.dark{background:var(--parchment-dark);}
  .cell.start{background:#cfe3c4;}
  .cell.finish{background:#f6d98b;}
  .cell .num{position:relative; z-index:2;}
  .cell.ladder-top::after, .cell.ladder-bottom::after{
    content:'';
  }
  svg.overlay{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:3;
  }
  .token{
    position:absolute;
    width:5.6%;
    height:5.6%;
    border-radius:50%;
    border:2px solid rgba(0,0,0,.35);
    box-shadow:0 3px 6px rgba(0,0,0,.4);
    transition:left .45s cubic-bezier(.5,0,.3,1), top .45s cubic-bezier(.5,0,.3,1);
    z-index:5;
  }
  .token.p1{background:radial-gradient(circle at 35% 30%, #ff8a5c, var(--p1) 60%, var(--p1-dark)); }
  .token.p2{background:radial-gradient(circle at 35% 30%, #7fd6e2, var(--p2) 60%, var(--p2-dark)); }

  /* ---- Side panel ---- */
  .panel{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .card{
    background:linear-gradient(180deg,var(--panel),var(--bg-deep));
    border:1px solid var(--panel-edge);
    border-radius:16px;
    padding:18px;
  }
  .players{
    display:grid;
    gap:10px;
  }
  .player-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:11px;
    background:var(--bg-deep-2);
    border:1.5px solid transparent;
    transition:border-color .2s, background .2s;
  }
  .player-row.turn{
    border-color:var(--gold-bright);
    background:#24413a;
  }
  .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .dot.p1{background:var(--p1);}
  .dot.p2{background:var(--p2);}
  .player-info{flex:1; min-width:0;}
  .player-info .pname{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .player-info .ppos{
    font-size:11.5px;
    color:var(--ink-dim);
  }
  .turn-tag{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--gold-bright);
    font-weight:700;
  }

  .dice-card{
    text-align:center;
  }
  .status-line{
    min-height:20px;
    font-size:13.5px;
    color:var(--ink-dim);
    margin-bottom:14px;
  }
  .dice{
    width:64px;
    height:64px;
    margin:0 auto 16px;
    background:linear-gradient(180deg,#fff,#e8e2d4);
    border-radius:14px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:9px;
    box-shadow:0 8px 18px -6px rgba(0,0,0,.5), inset 0 0 0 1px #cfc7b3;
    transition:transform .12s;
  }
  .dice.rolling{animation:shake .5s ease-in-out;}
  @keyframes shake{
    0%,100%{transform:rotate(0deg);}
    20%{transform:rotate(-14deg);}
    40%{transform:rotate(12deg);}
    60%{transform:rotate(-8deg);}
    80%{transform:rotate(6deg);}
  }
  .pip{width:100%; height:100%; display:flex; align-items:center; justify-content:center;}
  .pip::after{
    content:'';
    width:60%;
    height:60%;
    border-radius:50%;
    background:#2a2005;
  }
  .roll-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    color:#2a2005;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:filter .15s, transform .15s, opacity .15s;
  }
  .roll-btn:hover:not(:disabled){filter:brightness(1.08); transform:translateY(-1px);}
  .roll-btn:disabled{opacity:.45; cursor:not-allowed;}

  .legend{
    display:flex;
    flex-direction:column;
    gap:8px;
    font-size:12.5px;
    color:var(--ink-dim);
  }
  .legend .row{display:flex; align-items:center; gap:8px;}
  .legend .swatch{width:20px; height:3px; border-radius:2px; flex-shrink:0;}
  .legend .swatch.ladder{background:var(--gold-bright);}
  .legend .swatch.snake{background:var(--snake-red);}

  .new-game-btn{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1.5px solid var(--panel-edge);
    background:transparent;
    color:var(--ink-dim);
    font-family:'Inter',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .new-game-btn:hover{border-color:var(--gold-bright); color:var(--ink);}

  .winner-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,18,16,.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .winner-overlay.show{display:flex;}
  .winner-card{
    background:linear-gradient(180deg,var(--panel),var(--bg-deep));
    border:1px solid var(--gold-bright);
    border-radius:18px;
    padding:34px 30px;
    text-align:center;
    max-width:360px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8);
  }
  .winner-card .trophy{font-size:42px; margin-bottom:10px;}
  .winner-card h3{
    font-family:'Fredoka',sans-serif;
    font-size:22px;
    margin:0 0 8px;
  }
  .winner-card p{color:var(--ink-dim); margin:0 0 20px; font-size:13.5px;}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="eyebrow">Board Game</div>
    <h1>Coil &amp; <span>Climb</span></h1>
    <p class="sub">Classic snakes and ladders — race a friend or the computer to square 100.</p>
  </header>

  <!-- SETUP -->
  <div class="setup" id="setupScreen">
    <h2>Choose your match</h2>
    <div class="mode-choices">
      <button class="mode-btn active" id="modeTwo" type="button">
        <span class="icon">🧑‍🤝‍🧑</span>Two Players
      </button>
      <button class="mode-btn" id="modeComputer" type="button">
        <span class="icon">🤖</span>Vs Computer
      </button>
    </div>
    <div class="name-fields">
      <div class="name-field">
        <label for="p1Name">Player 1 name</label>
        <input type="text" id="p1Name" maxlength="14" placeholder="Player 1">
      </div>
      <div class="name-field" id="p2Field">
        <label for="p2Name">Player 2 name</label>
        <input type="text" id="p2Name" maxlength="14" placeholder="Player 2">
      </div>
    </div>
    <button class="start-btn" id="startBtn" type="button">Start Game</button>
  </div>

  <!-- GAME -->
  <div class="game" id="gameScreen">
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="panel">
      <div class="card">
        <div class="players" id="playersList"></div>
      </div>

      <div class="card dice-card">
        <div class="status-line" id="statusLine">Roll the dice to begin.</div>
        <div class="dice" id="dice"></div>
        <button class="roll-btn" id="rollBtn" type="button">Roll Dice</button>
      </div>

      <div class="card">
        <div class="legend">
          <div class="row"><span class="swatch ladder"></span> Ladder — climb up</div>
          <div class="row"><span class="swatch snake"></span> Snake — slide down</div>
        </div>
      </div>

      <button class="new-game-btn" id="newGameBtn" type="button">↺ New Game</button>
    </div>
  </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-card">
    <div class="trophy">🏆</div>
    <h3 id="winnerText">Winner!</h3>
    <p>They climbed every ladder and dodged the snakes to reach square 100.</p>
    <button class="start-btn" id="playAgainBtn" type="button">Play Again</button>
  </div>
</div>

<script>
(function(){
  // ---------- Board data ----------
  const LADDERS = {2:38, 7:14, 8:31, 15:26, 21:42, 28:84, 36:44, 51:67, 71:91, 78:98};
  const SNAKES  = {16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 92:88, 95:75, 99:78};

  function cellRowCol(n){
    const row = Math.floor((n-1)/10);
    const posInRow = (n-1) % 10;
    const col = (row % 2 === 0) ? posInRow : (9 - posInRow);
    return {row, col};
  }
  function cellCenterPct(n){
    const {row, col} = cellRowCol(n);
    const topRowFromTop = 9 - row;
    const cell = 10; // percent per cell
    return {
      x: col*cell + cell/2,
      y: topRowFromTop*cell + cell/2
    };
  }

  // ---------- State ----------
  let mode = 'two'; // 'two' | 'computer'
  let players = [];
  let current = 0;
  let diceValue = 1;
  let rolling = false;
  let gameOver = false;

  // ---------- Setup screen ----------
  const modeTwo = document.getElementById('modeTwo');
  const modeComputer = document.getElementById('modeComputer');
  const p2Field = document.getElementById('p2Field');
  const p1Name = document.getElementById('p1Name');
  const p2Name = document.getElementById('p2Name');
  const startBtn = document.getElementById('startBtn');
  const setupScreen = document.getElementById('setupScreen');
  const gameScreen = document.getElementById('gameScreen');

  modeTwo.addEventListener('click', () => {
    mode = 'two';
    modeTwo.classList.add('active');
    modeComputer.classList.remove('active');
    p2Field.style.display = '';
    p2Name.placeholder = 'Player 2';
  });
  modeComputer.addEventListener('click', () => {
    mode = 'computer';
    modeComputer.classList.add('active');
    modeTwo.classList.remove('active');
    p2Field.style.display = '';
    p2Name.placeholder = 'Computer';
  });

  startBtn.addEventListener('click', () => {
    const name1 = (p1Name.value || 'Player 1').trim();
    const name2raw = (p2Name.value || (mode === 'computer' ? 'Computer' : 'Player 2')).trim();
    players = [
      {name: name1, pos: 0, isComputer: false, color: 'p1'},
      {name: mode === 'computer' ? (name2raw || 'Computer') : name2raw, pos: 0, isComputer: mode === 'computer', color: 'p2'}
    ];
    current = 0;
    gameOver = false;
    setupScreen.style.display = 'none';
    gameScreen.classList.add('active');
    buildBoard();
    renderPlayers();
    renderTokens();
    updateStatus('Roll the dice to begin.');
    maybeComputerTurn();
  });

  document.getElementById('newGameBtn').addEventListener('click', resetToSetup);
  document.getElementById('playAgainBtn').addEventListener('click', () => {
    document.getElementById('winnerOverlay').classList.remove('show');
    resetToSetup();
  });

  function resetToSetup(){
    gameScreen.classList.remove('active');
    setupScreen.style.display = '';
    document.getElementById('winnerOverlay').classList.remove('show');
  }

  // ---------- Board building ----------
  const boardEl = document.getElementById('board');

  function buildBoard(){
    boardEl.innerHTML = '';
    // render rows top (10) to bottom (1)
    for(let renderRow = 0; renderRow < 10; renderRow++){
      const boardRow = 9 - renderRow; // 0-indexed from bottom
      const isEven = boardRow % 2 === 0;
      for(let c = 0; c < 10; c++){
        const posInRow = isEven ? c : (9 - c);
        const n = boardRow*10 + posInRow + 1;
        const div = document.createElement('div');
        const shade = ((renderRow + c) % 2 === 0) ? 'light' : 'dark';
        div.className = 'cell ' + shade;
        if(n === 1) div.classList.add('start');
        if(n === 100) div.classList.add('finish');
        const span = document.createElement('span');
        span.className = 'num';
        span.textContent = n;
        div.appendChild(span);
        boardEl.appendChild(div);
      }
    }
    // overlay svg for ladders/snakes
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'overlay');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');

    Object.entries(LADDERS).forEach(([from, to]) => drawLadder(svg, +from, +to));
    Object.entries(SNAKES).forEach(([from, to]) => drawSnake(svg, +from, +to));

    boardEl.appendChild(svg);

    // tokens container
    ['p1','p2'].forEach(id => {
      const t = document.createElement('div');
      t.className = 'token ' + id;
      t.id = 'token-' + id;
      boardEl.appendChild(t);
    });
  }

  function drawLadder(svg, from, to){
    const a = cellCenterPct(from), b = cellCenterPct(to);
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const nx = -dy/len, ny = dx/len; // perpendicular
    const half = 1.6;
    const svgNS = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('opacity', '0.92');

    [-1, 1].forEach(side => {
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', a.x + nx*half*side);
      line.setAttribute('y1', a.y + ny*half*side);
      line.setAttribute('x2', b.x + nx*half*side);
      line.setAttribute('y2', b.y + ny*half*side);
      line.setAttribute('stroke', '#c9a227');
      line.setAttribute('stroke-width', '0.9');
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    });
    const rungs = Math.max(3, Math.round(len/6));
    for(let i=1;i<rungs;i++){
      const t = i/rungs;
      const cx = a.x + dx*t, cy = a.y + dy*t;
      const rung = document.createElementNS(svgNS, 'line');
      rung.setAttribute('x1', cx + nx*half);
      rung.setAttribute('y1', cy + ny*half);
      rung.setAttribute('x2', cx - nx*half);
      rung.setAttribute('y2', cy - ny*half);
      rung.setAttribute('stroke', '#e4c247');
      rung.setAttribute('stroke-width', '0.7');
      g.appendChild(rung);
    }
    svg.appendChild(g);
  }

  function drawSnake(svg, from, to){
    const a = cellCenterPct(from), b = cellCenterPct(to);
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const nx = -dy/len, ny = dx/len;
    const wiggles = 3;
    let d = `M ${a.x} ${a.y} `;
    for(let i=1;i<=wiggles;i++){
      const t1 = (i-0.5)/wiggles;
      const t2 = i/wiggles;
      const side = (i % 2 === 0) ? 1 : -1;
      const cx = a.x + dx*t1 + nx*6*side;
      const cy = a.y + dy*t1 + ny*6*side;
      const ex = a.x + dx*t2;
      const ey = a.y + dy*t2;
      d += `Q ${cx} ${cy} ${ex} ${ey} `;
    }
    const svgNS = 'http://www.w3.org/2000/svg';
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#8f3128');
    path.setAttribute('stroke-width', '2.6');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);

    const path2 = document.createElementNS(svgNS, 'path');
    path2.setAttribute('d', d);
    path2.setAttribute('fill', 'none');
    path2.setAttribute('stroke', '#c0473a');
    path2.setAttribute('stroke-width', '1.5');
    path2.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path2);

    // head at "from"
    const head = document.createElementNS(svgNS, 'circle');
    head.setAttribute('cx', a.x);
    head.setAttribute('cy', a.y);
    head.setAttribute('r', '2.1');
    head.setAttribute('fill', '#c0473a');
    svg.appendChild(head);
    const eye = document.createElementNS(svgNS, 'circle');
    eye.setAttribute('cx', a.x + 0.6);
    eye.setAttribute('cy', a.y - 0.6);
    eye.setAttribute('r', '0.4');
    eye.setAttribute('fill', '#fff');
    svg.appendChild(eye);
  }

  // ---------- Tokens ----------
  function renderTokens(){
    players.forEach((p, i) => {
      const el = document.getElementById('token-' + p.color);
      const n = p.pos === 0 ? 1 : p.pos;
      const c = cellCenterPct(n);
      // offset slightly if both players share a cell
      let offsetX = 0, offsetY = 0;
      if(players.length === 2 && players[0].pos === players[1].pos){
        offsetX = i === 0 ? -1.6 : 1.6;
      }
      if(p.pos === 0){
        // sit just outside/at start
        offsetX += (i === 0 ? -1.6 : 1.6);
        offsetY = 2.2;
      }
      el.style.left = (c.x + offsetX - 2.8) + '%';
      el.style.top = (c.y + offsetY - 2.8) + '%';
    });
  }

  // ---------- Players panel ----------
  const playersList = document.getElementById('playersList');
  function renderPlayers(){
    playersList.innerHTML = '';
    players.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'player-row' + (i === current && !gameOver ? ' turn' : '');
      row.innerHTML = `
        <span class="dot ${p.color}"></span>
        <div class="player-info">
          <div class="pname">${escapeHtml(p.name)}${p.isComputer ? ' 🤖' : ''}</div>
          <div class="ppos">Square ${p.pos}</div>
        </div>
        ${(i === current && !gameOver) ? '<span class="turn-tag">Turn</span>' : ''}
      `;
      playersList.appendChild(row);
    });
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Dice ----------
  const diceEl = document.getElementById('dice');
  const rollBtn = document.getElementById('rollBtn');
  const statusLine = document.getElementById('statusLine');

  const PIP_LAYOUTS = {
    1: [4],
    2: [0,8],
    3: [0,4,8],
    4: [0,2,6,8],
    5: [0,2,4,6,8],
    6: [0,2,3,5,6,8]
  };
  function renderDice(value){
    diceEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const cell = document.createElement('div');
      if(PIP_LAYOUTS[value].includes(i)){
        cell.className = 'pip';
      }
      diceEl.appendChild(cell);
    }
  }
  renderDice(1);

  function updateStatus(msg){ statusLine.textContent = msg; }

  rollBtn.addEventListener('click', () => doRoll());

  function doRoll(){
    if(rolling || gameOver) return;
    const activePlayer = players[current];
    rolling = true;
    rollBtn.disabled = true;
    diceEl.classList.add('rolling');
    updateStatus(`${activePlayer.name} is rolling…`);

    let ticks = 0;
    const ticker = setInterval(() => {
      renderDice(1 + Math.floor(Math.random()*6));
      ticks++;
      if(ticks > 7){
        clearInterval(ticker);
        const finalValue = 1 + Math.floor(Math.random()*6);
        renderDice(finalValue);
        diceEl.classList.remove('rolling');
        applyMove(finalValue);
      }
    }, 70);
  }

  function applyMove(value){
    const p = players[current];
    let target = p.pos + value;
    let overshoot = false;
    if(target > 100){
      overshoot = true;
      target = p.pos; // stay in place
    }
    const landedExactly = target === 100;

    const finish = () => {
      renderPlayers();
      renderTokens();

      if(target === 100){
        setTimeout(() => endGame(p), 350);
        return;
      }

      let extraTurn = (value === 6);
      let msg = `${p.name} rolled ${value}`;
      if(overshoot) msg = `${p.name} rolled ${value} — needs exact number, stays on ${p.pos}.`;
      else if(extraTurn) msg += ' — rolled a 6, roll again!';

      updateStatus(msg);
      rolling = false;
      rollBtn.disabled = false;

      if(!overshoot && !extraTurn){
        nextTurn();
      } else if(extraTurn){
        maybeComputerTurn(true);
      } else {
        nextTurn();
      }
    };

    if(overshoot){
      finish();
      return;
    }

    p.pos = target;
    renderPlayers();
    renderTokens();

    // check ladder/snake after a short beat so the initial move is visible
    setTimeout(() => {
      let jumped = null;
      if(LADDERS[target]){
        jumped = {type:'ladder', to: LADDERS[target]};
      } else if(SNAKES[target]){
        jumped = {type:'snake', to: SNAKES[target]};
      }
      if(jumped){
        p.pos = jumped.to;
        renderPlayers();
        renderTokens();
        setTimeout(() => {
          if(jumped.to === 100){
            endGame(p);
          } else {
            postJumpMessage(p, jumped, value);
          }
        }, 480);
      } else {
        finish();
      }
    }, 420);
  }

  function postJumpMessage(p, jumped, value){
    const climbWord = jumped.type === 'ladder' ? `climbed a ladder to ${p.pos}!` : `slid down a snake to ${p.pos}!`;
    updateStatus(`${p.name} rolled ${value} and ${climbWord}`);
    rolling = false;
    rollBtn.disabled = false;
    if(value === 6){
      maybeComputerTurn(true);
    } else {
      nextTurn();
    }
  }

  function nextTurn(){
    current = (current + 1) % players.length;
    renderPlayers();
    updateStatus(`${players[current].name}'s turn.`);
    maybeComputerTurn();
  }

  function maybeComputerTurn(sameTurn){
    if(gameOver) return;
    const p = players[current];
    if(p.isComputer){
      rollBtn.disabled = true;
      setTimeout(() => { if(!gameOver) doRoll(); }, 850);
    } else {
      rollBtn.disabled = false;
    }
  }

  function endGame(winner){
    gameOver = true;
    rollBtn.disabled = true;
    renderPlayers();
    updateStatus(`${winner.name} wins! 🎉`);
    document.getElementById('winnerText').textContent = `${winner.name} wins!`;
    document.getElementById('winnerOverlay').classList.add('show');
  }

})();
</script>
</body>
</html>
